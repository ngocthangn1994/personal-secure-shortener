<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Personal Secure Shortener</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="cyber-particles">
    <span style="left: 8%; animation-duration: 8s; animation-delay: 0s;"></span>
    <span style="left: 18%; animation-duration: 10s; animation-delay: 1s;"></span>
    <span style="left: 28%; animation-duration: 7s; animation-delay: 2s;"></span>
    <span style="left: 38%; animation-duration: 11s; animation-delay: 0.5s;"></span>
    <span style="left: 48%; animation-duration: 9s; animation-delay: 1.5s;"></span>
    <span style="left: 58%; animation-duration: 12s; animation-delay: 2.5s;"></span>
    <span style="left: 68%; animation-duration: 8s; animation-delay: 3s;"></span>
    <span style="left: 78%; animation-duration: 10s; animation-delay: 1.2s;"></span>
    <span style="left: 88%; animation-duration: 9s; animation-delay: 2.2s;"></span>
  </div>

  <div class="container">
    <h1>Personal Secure Shortener</h1>

    <form id="linkForm">
      <label for="short">Short Key</label>
      <input type="text" id="short" name="short" placeholder="google" required />

      <label for="longUrl">Long URL</label>
      <input type="url" id="longUrl" name="longUrl" placeholder="https://www.google.com" required />

      <label for="userName">Username</label>
      <input type="text" id="userName" name="userName" placeholder="myuser" required />

      <label for="passWord">Password</label>
      <input type="password" id="passWord" name="passWord" placeholder="mypassword" required />

      <button type="submit">Save Link</button>
    </form>

    <p id="statusMessage"></p>

    <hr />

    <h2>Saved Links</h2>
    <div id="linksContainer"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
